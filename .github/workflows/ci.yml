name: CI

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "📂 Checking repository structure..."
          ls -la
          echo ""
